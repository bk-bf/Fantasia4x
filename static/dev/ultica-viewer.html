<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultica Tile Viewer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0d0d0d; color: #c8c8c8; font-family: 'Courier New', monospace; padding: 16px; }
      h1 { color: #ff9900; font-size: 16px; margin-bottom: 6px; }
      .hint { color: #777; font-size: 11px; margin-bottom: 12px; }
      .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
      label { font-size: 12px; color: #999; }
      input[type='text'] { background: #1a1a1a; border: 1px solid #444; color: #eee; padding: 4px 8px; font-family: monospace; font-size: 12px; width: 200px; }
      input[type='range'] { width: 120px; vertical-align: middle; }
      .scale-val { color: #ff9900; font-size: 12px; }
      .sheet-section { margin-bottom: 28px; }
      .sheet-title { font-size: 13px; color: #ff9900; margin-bottom: 6px; border-bottom: 1px solid #333; padding-bottom: 4px; }
      .grid-wrap { position: relative; display: inline-block; border: 1px solid #333; background: #161616; background-image: linear-gradient(45deg,#1c1c1c 25%,transparent 25%,transparent 75%,#1c1c1c 75%),linear-gradient(45deg,#1c1c1c 25%,transparent 25%,transparent 75%,#1c1c1c 75%); background-size: 16px 16px; background-position: 0 0, 8px 8px; }
      canvas.sheet-canvas { display: block; image-rendering: pixelated; }
      canvas.overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
      .tooltip { position: fixed; background: #1a1a1a; border: 1px solid #ff9900; color: #eee; padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 100; white-space: nowrap; }
      .tooltip b { color: #ff9900; }
      .copied { position: fixed; top: 20px; right: 20px; background: #1a4a1a; border: 1px solid #4a4; color: #8f8; padding: 8px 14px; font-size: 12px; z-index: 200; display: none; }
      .miss { color: #a44; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>ULTICA TILE VIEWER</h1>
    <div class="hint">
      Representative sprite per CDDA tile-id (UltimateCataclysm, 32×32). Hover → id · click → copy id.
      Atlases generated by <code>static/dev/ultica/pack.py</code>.
    </div>
    <div class="controls">
      <label>Scale: <input type="range" id="scaleSlider" min="1" max="6" value="2" step="1" /><span class="scale-val" id="scaleVal">2×</span></label>
      <label>Filter id: <input type="text" id="filter" placeholder="e.g. table, wall, f_, mon_wolf" /></label>
    </div>
    <div id="sheets"></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="copied" id="copied">Copied!</div>

    <script>
      const CELL = 32, COLS = 16;
      let scale = 2, filter = '';
      const state = {}; // name -> { img, tiles, rows, canvas, overlay }
      let hoveredSheet = null, hoveredIdx = -1;

      const tooltip = document.getElementById('tooltip');
      const copied = document.getElementById('copied');
      let copiedTimer = null;
      function showCopied() { copied.style.display = 'block'; clearTimeout(copiedTimer); copiedTimer = setTimeout(() => (copied.style.display = 'none'), 1000); }

      document.getElementById('scaleSlider').addEventListener('input', (e) => {
        scale = +e.target.value; document.getElementById('scaleVal').textContent = scale + '×'; redrawAll();
      });
      document.getElementById('filter').addEventListener('input', (e) => { filter = e.target.value.trim().toLowerCase(); redrawAll(); });

      function loadImage(src) {
        return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = () => rej(new Error('Failed: ' + src)); i.src = src; });
      }

      function match(name) { return filter === '' || (name && name.toLowerCase().includes(filter)); }

      function draw(name) {
        const st = state[name];
        const cw = COLS * CELL * scale, ch = st.rows * CELL * scale;
        st.canvas.width = cw; st.canvas.height = ch;
        const ctx = st.canvas.getContext('2d'); ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, cw, ch);
        for (let i = 0; i < st.tiles.length; i++) {
          const r = (i / COLS) | 0, c = i % COLS;
          const dim = !match(st.tiles[i]);
          ctx.globalAlpha = dim ? 0.12 : 1;
          ctx.drawImage(st.img, c * CELL, r * CELL, CELL, CELL, c * CELL * scale, r * CELL * scale, CELL * scale, CELL * scale);
        }
        ctx.globalAlpha = 1;
      }

      function drawOverlay(name, hi = -1) {
        const st = state[name];
        const tw = CELL * scale, th = CELL * scale, cw = COLS * tw, ch = st.rows * th;
        st.overlay.width = cw; st.overlay.height = ch;
        const ctx = st.overlay.getContext('2d'); ctx.clearRect(0, 0, cw, ch);
        if (hi >= 0) {
          const r = (hi / COLS) | 0, c = hi % COLS, x = c * tw, y = r * th;
          ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2; ctx.strokeRect(x + 1, y + 1, tw - 2, th - 2);
        }
      }

      function redrawAll() { for (const n in state) { draw(n); drawOverlay(n, hoveredSheet === n ? hoveredIdx : -1); } }

      function attach(name) {
        const st = state[name], wrap = st.overlay.parentElement;
        wrap.addEventListener('mousemove', (e) => {
          const rect = st.overlay.getBoundingClientRect();
          const tw = CELL * scale, th = CELL * scale;
          const c = Math.floor((e.clientX - rect.left) / tw), r = Math.floor((e.clientY - rect.top) / th);
          const idx = r * COLS + c;
          if (idx < 0 || idx >= st.tiles.length) return;
          hoveredSheet = name; hoveredIdx = idx; drawOverlay(name, idx);
          const id = st.tiles[idx] || '(empty)';
          tooltip.innerHTML = `<b>${id}</b><br><span style="color:#999">${name} · click to copy id</span>`;
          tooltip.style.display = 'block'; tooltip.style.left = e.clientX + 14 + 'px'; tooltip.style.top = e.clientY + 8 + 'px';
        });
        wrap.addEventListener('mouseleave', () => { hoveredSheet = null; hoveredIdx = -1; drawOverlay(name, -1); tooltip.style.display = 'none'; });
        wrap.addEventListener('click', () => { if (hoveredIdx < 0) return; const id = st.tiles[hoveredIdx]; if (id) navigator.clipboard.writeText(id).then(showCopied); });
      }

      async function init() {
        const container = document.getElementById('sheets');
        let manifest;
        try { manifest = await (await fetch('/dev/ultica/manifest.json')).json(); }
        catch (e) { container.innerHTML = '<div class="miss">⚠ manifest.json not found — run static/dev/ultica/pack.py first.</div>'; return; }
        for (const a of manifest.atlases) {
          const section = document.createElement('div'); section.className = 'sheet-section';
          const title = document.createElement('div'); title.className = 'sheet-title';
          title.textContent = `${a.name.toUpperCase()}  (${a.count} ids)`;
          section.appendChild(title);
          const wrap = document.createElement('div'); wrap.className = 'grid-wrap'; wrap.style.cursor = 'crosshair';
          const can = document.createElement('canvas'); can.className = 'sheet-canvas';
          const ov = document.createElement('canvas'); ov.className = 'overlay-canvas';
          wrap.appendChild(can); wrap.appendChild(ov); section.appendChild(wrap); container.appendChild(section);
          try {
            const img = await loadImage('/dev/ultica/' + a.file);
            state[a.name] = { img, tiles: a.tiles, rows: a.rows, canvas: can, overlay: ov };
            draw(a.name); drawOverlay(a.name, -1); attach(a.name);
          } catch (err) { wrap.outerHTML = '<div class="miss">⚠ ' + err.message + '</div>'; }
        }
      }
      init();
    </script>
  </body>
</html>
