<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fantasia4x — Codebase Graph</title>
<style>
  :root {
    --bg: #0e1116;
    --bg-panel: #161b22;
    --bg-elev: #1c232d;
    --border: #2a313c;
    --fg: #d7dce3;
    --fg-dim: #8b94a3;
    --accent: #f5a623;
    --accent2: #57c7ff;
    --dim-opacity: 0.12;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.5 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace;
    overflow: hidden;
  }
  #app { display: grid; grid-template-rows: 50px 1fr; height: 100vh; }
  #workarea { display: grid; grid-template-columns: 1fr 0px; min-height: 0; transition: grid-template-columns .18s; }
  #workarea.detail-open { grid-template-columns: 1fr 360px; }

  /* ---------- headbar ---------- */
  .headbar {
    display: flex; align-items: center; gap: 14px; padding: 0 16px; min-width: 0;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
  }
  .headbar .brand { font-size: 14px; letter-spacing: .5px; white-space: nowrap; }
  .headbar .brand b { color: var(--accent); }
  .headbar .vsep { width: 1px; height: 24px; background: var(--border); flex: none; }
  .headbar .grow { flex: 1; min-width: 8px; }
  .stats { color: var(--fg-dim); font-size: 11px; white-space: nowrap; }
  .hb-field { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .ctl-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--fg-dim); }
  input.modpick {
    width: 230px; background: var(--bg); border: 1px solid var(--border); color: var(--fg);
    padding: 6px 9px; border-radius: 6px; font-family: inherit; font-size: 12px;
  }
  input.modpick:focus { outline: none; border-color: var(--accent2); }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .seg button { background: var(--bg); color: var(--fg-dim); border: 0; padding: 6px 12px; font-family: inherit; font-size: 11px; cursor: pointer; }
  .seg button.on { background: var(--accent); color: #11151b; font-weight: 600; }
  .switch { position: relative; width: 38px; height: 21px; flex: none; cursor: pointer; }
  .switch input { display: none; }
  .switch > span { position: absolute; inset: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 11px; transition: .15s; }
  .switch > span::after { content: ''; position: absolute; width: 15px; height: 15px; left: 2px; top: 2px; background: var(--fg-dim); border-radius: 50%; transition: .15s; }
  .switch input:checked + span { background: var(--accent2); border-color: var(--accent2); }
  .switch input:checked + span::after { left: 19px; background: #11151b; }

  @media (max-width: 1100px) { .hb-collapse { display: none; } input.modpick { width: 150px; } }

  /* ---------- graph area ---------- */
  main { position: relative; min-width: 0; overflow: hidden; background:
      radial-gradient(circle at 1px 1px, #1a2029 1px, transparent 0) 0 0 / 26px 26px var(--bg); }
  #crumbs { position: absolute; top: 0; left: 0; right: 0; z-index: 5; padding: 10px 14px;
    background: linear-gradient(var(--bg), transparent); display: flex; gap: 8px; align-items: center; font-size: 12px; pointer-events: none; }
  #crumbs a { color: var(--accent2); cursor: pointer; pointer-events: auto; }
  #crumbs .sep { color: var(--fg-dim); }
  #crumbs .cur { color: var(--fg); }
  #graph { width: 100%; height: 100%; overflow: hidden; cursor: grab; }
  #graph.panning { cursor: grabbing; }
  #graph svg { max-width: none !important; height: auto !important; }
  #viewport { transform-origin: 0 0; will-change: transform; }
  #hint { position: absolute; bottom: 12px; left: 14px; color: var(--fg-dim); font-size: 11px; z-index: 5; }
  #zoomctl { position: absolute; bottom: 12px; right: 14px; z-index: 5; display: flex; gap: 6px; align-items: center; }
  #zoomctl button { background: var(--bg-panel); border: 1px solid var(--border); color: var(--fg); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; }
  #zoomctl button:hover { border-color: var(--accent2); }
  #zoomreadout { display: flex; align-items: center; height: 30px; padding: 0 4px 0 8px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; }
  #zoompct { width: 34px; background: transparent; border: 0; color: var(--fg); font-family: inherit; font-size: 12px; text-align: right; padding: 0; }
  #zoompct:focus { outline: none; color: var(--accent2); }
  #zoomreadout .pct { color: var(--fg-dim); font-size: 11px; padding-left: 1px; }
  #zdefault { font-size: 14px; }
  #zdefault.on { color: var(--accent); border-color: var(--accent); }
  #loading { position: absolute; inset: 0; display: grid; place-items: center; color: var(--fg-dim); }

  /* ---------- detail panel ---------- */
  #detail { background: var(--bg-panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 0; }
  #detail .dh { padding: 14px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-panel); }
  #detail .dh .kind { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
  #detail .dh h2 { margin: 4px 0 0; font-size: 14px; word-break: break-word; }
  #detail .dh .close { position: absolute; top: 12px; right: 12px; cursor: pointer; color: var(--fg-dim); font-size: 18px; line-height: 1; }
  #detail .body { padding: 14px 16px; }
  #detail .row { margin-bottom: 14px; }
  #detail .row .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--fg-dim); margin-bottom: 4px; }
  #detail .sig { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--accent2); word-break: break-word; white-space: pre-wrap; }
  #detail .desc { color: var(--fg); }
  #detail a.jump { color: var(--accent2); cursor: pointer; text-decoration: none; }
  #detail a.jump:hover { text-decoration: underline; }
  #detail ul { margin: 0; padding-left: 0; list-style: none; }
  #detail li { padding: 4px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  #detail li:hover { color: var(--accent); }
  #detail li .arr { color: var(--fg-dim); margin: 0 6px; }
  .empty-detail { padding: 30px 18px; color: var(--fg-dim); text-align: center; }

  /* svg interaction states (applied to mermaid output) */
  svg .node, svg .edgePaths > path, svg .edgeLabel { transition: opacity .12s; }
  svg.has-focus .node { opacity: var(--dim-opacity); }
  svg.has-focus .edgePaths > path { opacity: var(--dim-opacity); }
  svg.has-focus .edgeLabel { opacity: var(--dim-opacity); }
  svg .node.hot { opacity: 1 !important; }
  svg .node.hot rect, svg .node.hot polygon, svg .node.hot circle { filter: drop-shadow(0 0 4px var(--accent)); }
  svg .node.origin rect, svg .node.origin polygon, svg .node.origin circle { stroke: var(--accent) !important; stroke-width: 3px !important; }
  svg .edgePaths > path.hot { opacity: 1 !important; stroke: var(--accent) !important; stroke-width: 2.5px !important; }
  svg .edgePaths > path.hot-in { stroke: var(--accent2) !important; }
  svg .edgeLabel.hot { opacity: 1 !important; }
  svg .node { cursor: pointer; }
  svg .edgePaths > path { cursor: pointer; pointer-events: stroke; }
  svg .node tspan { pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <header class="headbar">
    <span class="brand"><b>Fantasia</b>4x · code graph</span>
    <span class="vsep"></span>
    <div class="seg" id="viewseg">
      <button data-view="overview" class="on">Architecture</button>
      <button data-view="module">Module</button>
    </div>
    <div class="hb-field">
      <span class="ctl-label hb-collapse">Module</span>
      <input class="modpick" id="modpick" list="modlist-data" placeholder="jump to module…" autocomplete="off" />
      <datalist id="modlist-data"></datalist>
    </div>
    <span class="vsep"></span>
    <label class="hb-field" for="lbltoggle"><span class="ctl-label">Plain-English</span>
      <span class="switch"><input type="checkbox" id="lbltoggle"><span></span></span></label>
    <label class="hb-field" id="neighrow" for="neightoggle" style="display:none"><span class="ctl-label">Cross-module</span>
      <span class="switch"><input type="checkbox" id="neightoggle" checked><span></span></span></label>
    <span class="grow"></span>
    <span class="stats" id="statline"></span>
  </header>

  <div id="workarea">
    <main>
      <div id="crumbs"></div>
      <div id="graph"><div id="viewport"></div></div>
      <div id="loading">rendering graph…</div>
      <div id="hint">drag to pan · scroll to zoom · hover to trace · click for detail</div>
      <div id="zoomctl">
        <button id="zout" title="Zoom out">−</button>
        <div id="zoomreadout" title="Current zoom — type a number and press Enter to set">
          <input id="zoompct" inputmode="numeric" autocomplete="off" /><span class="pct">%</span>
        </div>
        <button id="zin" title="Zoom in">+</button>
        <button id="zfit" title="Fit to screen">⤢</button>
        <button id="zdefault" title="Set current zoom as the default for new views">★</button>
      </div>
    </main>

    <div id="detail"><div class="empty-detail">Select a node or edge.</div></div>
  </div>
</div>

<script type="application/json" id="graphdata">/*__GRAPH__*/</script>
<script type="application/json" id="descdata">/*__DESC__*/</script>
<script>/*__MERMAID__*/</script>

<script type="module">
const mermaid = window.mermaid;

const GRAPH = JSON.parse(document.getElementById('graphdata').textContent);
const DESC  = JSON.parse(document.getElementById('descdata').textContent);

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  flowchart: { useMaxWidth: false, htmlLabels: false, curve: 'basis', nodeSpacing: 45, rankSpacing: 70 },
  themeVariables: {
    fontFamily: 'JetBrains Mono, monospace', fontSize: '13px',
    lineColor: '#5b6675', mainBkg: '#1c232d', primaryBorderColor: '#3a4453',
    clusterBkg: '#13181f', clusterBorder: '#2a313c', primaryTextColor: '#d7dce3',
  },
});

// ----- group colours -----
const GROUP_COLORS = {
  core: '#57c7ff', services: '#f5a623', systems: '#ff6b9d', stores: '#7ee787',
  entities: '#c792ea', utils: '#8b94a3', dev: '#4b5563', webgl: '#5cd9c7', world: '#e0af68',
};
const groupColor = (g) => GROUP_COLORS[g] || '#8b94a3';

// ----- indexes -----
const nodeById = new Map(GRAPH.nodes.map(n => [n.id, n]));
const modByName = new Map(GRAPH.moduleNodes.map(m => [m.module, m]));
const outAdj = new Map();   // nodeId -> [edgeIndex...]
const inAdj  = new Map();
GRAPH.edges.forEach((e, i) => {
  (outAdj.get(e.from) || outAdj.set(e.from, []).get(e.from)).push(i);
  (inAdj.get(e.to)  || inAdj.set(e.to,  []).get(e.to)).push(i);
});
const modOut = new Map(); const modIn = new Map();
GRAPH.moduleEdges.forEach((e, i) => {
  (modOut.get(e.from) || modOut.set(e.from, []).get(e.from)).push(i);
  (modIn.get(e.to)  || modIn.set(e.to,  []).get(e.to)).push(i);
});

// ----- description resolution -----
function fnLabel(node, plain) {
  if (!plain) return node.short;
  return fnDesc(node);
}
function fnDesc(node) {
  const key = `${node.module}::${node.short}`;
  return DESC.functions[key] || node.desc || node.doc || node.humanized;
}
function modLabel(mod, plain) {
  if (!plain) return mod.module.replace(/^game\//, '');
  const d = DESC.modules[mod.module];
  return d ? d.split('. ')[0] + '.' : mod.module.replace(/^game\//, '');
}
function modDesc(mod) {
  return DESC.modules[mod.module] || `${mod.fns} functions. No curated description yet.`;
}

// Node labels. In plain mode we show the name AND the description stacked,
// never hiding the identifier — the description is appended under the name.
function fnNodeLabel(node, plain, w) {
  const name = wrap(node.short, w);
  if (!plain) return name;
  return name + '<br/>' + wrap(fnLabel(node, true), w + 4);
}
function modNodeLabel(mod, plain) {
  const name = esc(mod.module.split('/').pop());
  if (!plain) return `${name}<br/>${mod.fns} fn`;
  return `${name}<br/>` + wrap(modLabel(mod, true), 30);
}

// ----- mermaid label escaping -----
// Mermaid is configured with htmlLabels:false, so labels are SVG text.
// Quotes/#/; break the parser; <br/> is the supported line-break token.
function esc(s) { return String(s).replace(/["#;{}]/g, ' ').replace(/\s+/g, ' ').trim(); }
function wrap(s, n = 28) {
  s = esc(s);
  if (s.length <= n) return s;
  const words = s.split(' '); const lines = []; let cur = '';
  for (const w of words) {
    if ((cur ? cur + ' ' + w : w).length > n && cur) { lines.push(cur); cur = w; }
    else cur = cur ? cur + ' ' + w : w;
    if (lines.length >= 3) break;
  }
  if (cur && lines.length < 3) lines.push(cur);
  const joined = lines.join(' ');
  const truncated = joined.length < s.length;
  return lines.join('<br/>') + (truncated ? '…' : '');
}

// ----- state -----
const state = { view: 'overview', module: null, plain: false, neighbors: true };
let RENDER = null; // { mNodes: Map(svgKey->graphId), eList: [{from,to,idx,kind}] }

// =====================================================================
// Build mermaid source for a view
// =====================================================================
function buildOverview() {
  // group module nodes into subgraphs
  const groups = {};
  for (const m of GRAPH.moduleNodes) (groups[m.group] ||= []).push(m);
  // TB (top-to-bottom rank direction) renders this graph's shape landscape —
  // wide and short — to fill the viewport; LR comes out tall/portrait here.
  let src = 'flowchart TB\n';
  const idMap = new Map(); // module -> mNN
  let i = 0;
  for (const m of GRAPH.moduleNodes) idMap.set(m.module, 'm' + (i++));
  const styleLines = [];
  for (const [grp, mods] of Object.entries(groups)) {
    src += `subgraph G_${grp}["${grp.toUpperCase()}"]\n`;
    for (const m of mods) {
      const sid = idMap.get(m.module);
      const lbl = modNodeLabel(m, state.plain);
      src += `  ${sid}["${lbl}"]\n`;
      styleLines.push(`style ${sid} fill:${shade(groupColor(grp))},stroke:${groupColor(grp)},color:#e6edf3`);
    }
    src += 'end\n';
  }
  const eList = [];
  GRAPH.moduleEdges.forEach((e) => {
    const a = idMap.get(e.from), b = idMap.get(e.to);
    if (!a || !b) return;
    const w = e.count >= 6 ? '==>' : '-->';
    src += `${a} ${w} ${b}\n`;
    eList.push({ from: e.from, to: e.to });
  });
  src += styleLines.join('\n') + '\n';
  return { src, idMap, eList, kind: 'module' };
}

function buildModule(modName) {
  const fns = GRAPH.nodes.filter(n => n.module === modName);
  const fnIds = new Set(fns.map(n => n.id));
  // neighbour function nodes (1 hop) grouped by their module
  const neigh = new Set();
  if (state.neighbors) {
    for (const n of fns) {
      for (const ei of (outAdj.get(n.id) || [])) { const t = GRAPH.edges[ei].to; if (!fnIds.has(t)) neigh.add(t); }
      for (const ei of (inAdj.get(n.id) || []))  { const f = GRAPH.edges[ei].from; if (!fnIds.has(f)) neigh.add(f); }
    }
  }
  const visible = new Set([...fnIds, ...neigh]);
  const idMap = new Map(); let i = 0;
  for (const id of visible) idMap.set(id, 'f' + (i++));

  // TB (top-to-bottom rank direction) renders this graph's shape landscape —
  // wide and short — to fill the viewport; LR comes out tall/portrait here.
  let src = 'flowchart TB\n';
  const styleLines = [];
  // focused module subgraph
  src += `subgraph FOCUS["${modName.replace(/^game\//, '')}"]\n`;
  for (const n of fns) {
    const sid = idMap.get(n.id);
    src += `  ${sid}["${fnNodeLabel(n, state.plain, 22)}"]\n`;
    const c = groupColor(n.group);
    styleLines.push(`style ${sid} fill:${shade(c)},stroke:${c},color:#e6edf3`);
  }
  src += 'end\n';
  // neighbours grouped by module
  const byMod = {};
  for (const id of neigh) { const n = nodeById.get(id); (byMod[n.module] ||= []).push(n); }
  let gi = 0;
  for (const [mod, list] of Object.entries(byMod)) {
    src += `subgraph N${gi++}["${mod.replace(/^game\//, '')}"]\n`;
    for (const n of list) {
      const sid = idMap.get(n.id);
      src += `  ${sid}(["${fnNodeLabel(n, state.plain, 20)}"])\n`;
      const c = groupColor(n.group);
      styleLines.push(`style ${sid} fill:#161b22,stroke:${c},color:${c}`);
    }
    src += 'end\n';
  }
  // edges among visible
  const eList = [];
  GRAPH.edges.forEach((e) => {
    if (!visible.has(e.from) || !visible.has(e.to)) return;
    const a = idMap.get(e.from), b = idMap.get(e.to);
    const internal = fnIds.has(e.from) && fnIds.has(e.to);
    src += `${a} ${internal ? '-->' : '-.->'} ${b}\n`;
    eList.push({ from: e.from, to: e.to });
  });
  src += styleLines.join('\n') + '\n';
  return { src, idMap, eList, kind: 'fn', count: visible.size };
}

function shade(hex) {
  // darken a hex colour for fills
  const c = hex.replace('#', '');
  const r = Math.round(parseInt(c.slice(0, 2), 16) * 0.28);
  const g = Math.round(parseInt(c.slice(2, 4), 16) * 0.28);
  const b = Math.round(parseInt(c.slice(4, 6), 16) * 0.28);
  return `#${[r, g, b].map(x => x.toString(16).padStart(2, '0')).join('')}`;
}

// =====================================================================
// Render + wire interactivity
// =====================================================================
let renderSeq = 0;
async function render() {
  const seq = ++renderSeq;
  const loading = document.getElementById('loading');
  loading.style.display = 'grid';
  let built;
  try {
    built = state.view === 'overview' ? buildOverview() : buildModule(state.module);
  } catch (e) { loading.textContent = 'build error: ' + e.message; return; }

  let svg;
  try {
    const out = await mermaid.render('mmd' + seq, built.src);
    svg = out.svg;
  } catch (e) {
    if (seq !== renderSeq) return;
    loading.textContent = 'mermaid error: ' + e.message;
    console.error(e, built.src);
    return;
  }
  if (seq !== renderSeq) return;

  const vp = document.getElementById('viewport');
  vp.innerHTML = svg;
  loading.style.display = 'none';
  const svgEl = vp.querySelector('svg');

  // map svg node <g> -> graph id
  const idMapRev = new Map([...built.idMap.entries()].map(([gid, sid]) => [sid, gid]));
  RENDER = { eList: built.eList, kind: built.kind, gidBySvg: new Map(), svgByGid: new Map() };
  svgEl.querySelectorAll('g.node').forEach((g) => {
    const m = /flowchart-(m\d+|f\d+)-/.exec(g.id) || /(m\d+|f\d+)/.exec(g.id);
    if (!m) return;
    const gid = idMapRev.get(m[1]);
    if (!gid) return;
    RENDER.gidBySvg.set(g, gid);
    RENDER.svgByGid.set(gid, g);
    g.addEventListener('mouseenter', () => highlight(gid));
    g.addEventListener('mouseleave', clearHighlight);
    g.addEventListener('click', (ev) => { ev.stopPropagation(); onNodeClick(gid); });
  });

  // edge paths follow definition order
  RENDER.edgeEls = [...svgEl.querySelectorAll('g.edgePaths > path')];
  RENDER.edgeEls.forEach((p, idx) => {
    const e = built.eList[idx]; if (!e) return;
    p.addEventListener('mouseenter', () => highlightEdge(idx));
    p.addEventListener('mouseleave', clearHighlight);
    p.addEventListener('click', (ev) => { ev.stopPropagation(); onEdgeClick(idx); });
  });

  setupPanZoom(svgEl);
  applyInitialZoom();
  renderCrumbs();
  document.getElementById('neighrow').style.display = state.view === 'module' ? 'flex' : 'none';
}

// ---- highlight a node's flow ----
function highlight(gid) {
  const svgEl = document.querySelector('#viewport svg');
  if (!svgEl) return;
  svgEl.classList.add('has-focus');
  const og = RENDER.svgByGid.get(gid);
  if (og) { og.classList.add('hot', 'origin'); }
  const neighborGids = new Set();
  RENDER.eList.forEach((e, idx) => {
    if (e.from === gid || e.to === gid) {
      const p = RENDER.edgeEls[idx];
      if (p) p.classList.add('hot', e.to === gid ? 'hot-in' : '');
      neighborGids.add(e.from === gid ? e.to : e.from);
    }
  });
  neighborGids.forEach(n => { const el = RENDER.svgByGid.get(n); if (el) el.classList.add('hot'); });
}
function highlightEdge(idx) {
  const svgEl = document.querySelector('#viewport svg');
  if (!svgEl) return;
  svgEl.classList.add('has-focus');
  const p = RENDER.edgeEls[idx]; if (p) p.classList.add('hot');
  const e = RENDER.eList[idx];
  [e.from, e.to].forEach(g => { const el = RENDER.svgByGid.get(g); if (el) el.classList.add('hot'); });
}
function clearHighlight() {
  const svgEl = document.querySelector('#viewport svg');
  if (!svgEl) return;
  svgEl.classList.remove('has-focus');
  svgEl.querySelectorAll('.hot, .origin, .hot-in').forEach(el => el.classList.remove('hot', 'origin', 'hot-in'));
}

// =====================================================================
// Detail panel
// =====================================================================
function openDetail(html) {
  document.getElementById('detail').innerHTML = html;
  document.getElementById('workarea').classList.add('detail-open');
  document.querySelectorAll('#detail [data-go-mod]').forEach(el =>
    el.addEventListener('click', () => focusModule(el.dataset.goMod)));
  document.querySelectorAll('#detail [data-go-node]').forEach(el =>
    el.addEventListener('click', () => onNodeClick(el.dataset.goNode)));
  const cl = document.querySelector('#detail .close');
  if (cl) cl.addEventListener('click', closeDetail);
}
function closeDetail() { document.getElementById('workarea').classList.remove('detail-open'); }

function onNodeClick(gid) {
  if (RENDER.kind === 'module') {
    const mod = modByName.get(gid);
    showModuleDetail(mod);
  } else {
    const n = nodeById.get(gid);
    if (n) showFnDetail(n);
  }
}
function onEdgeClick(idx) {
  const e = RENDER.eList[idx];
  if (RENDER.kind === 'module') {
    const fromM = modByName.get(e.from), toM = modByName.get(e.to);
    const me = GRAPH.moduleEdges.find(x => x.from === e.from && x.to === e.to);
    openDetail(`
      <div class="dh"><span class="close">×</span><div class="kind">dependency</div>
        <h2>${shortMod(e.from)} → ${shortMod(e.to)}</h2></div>
      <div class="body">
        <div class="row"><div class="lbl">Calls</div><div>${me ? me.count : '?'} cross-module call site(s)</div></div>
        <div class="row"><div class="lbl">From</div><a class="jump" data-go-mod="${e.from}">${e.from}</a> — ${escapeHtml(modDesc(fromM))}</div>
        <div class="row"><div class="lbl">To</div><a class="jump" data-go-mod="${e.to}">${e.to}</a> — ${escapeHtml(modDesc(toM))}</div>
      </div>`);
  } else {
    const a = nodeById.get(e.from), b = nodeById.get(e.to);
    openDetail(`
      <div class="dh"><span class="close">×</span><div class="kind">call</div>
        <h2>${escapeHtml(a.short)} → ${escapeHtml(b.short)}</h2></div>
      <div class="body">
        <div class="row"><div class="lbl">Caller</div><a class="jump" data-go-node="${a.id}">${escapeHtml(a.short)}</a><div class="desc">${escapeHtml(fnDesc(a))}</div></div>
        <div class="row"><div class="lbl">Callee</div><a class="jump" data-go-node="${b.id}">${escapeHtml(b.short)}</a><div class="desc">${escapeHtml(fnDesc(b))}</div></div>
        <div class="row"><div class="lbl">Callee location</div><a class="jump" href="${vscodeUrl(b)}">${b.file}:${b.line}</a></div>
      </div>`);
  }
}

function showModuleDetail(mod) {
  const fns = GRAPH.nodes.filter(n => n.module === mod.module).sort((a, b) => b.inDegree - a.inDegree);
  const outs = (modOut.get(mod.module) || []).map(i => GRAPH.moduleEdges[i]);
  const ins  = (modIn.get(mod.module)  || []).map(i => GRAPH.moduleEdges[i]);
  openDetail(`
    <div class="dh"><span class="close">×</span><div class="kind" style="color:${groupColor(mod.group)}">${mod.group} module</div>
      <h2>${shortMod(mod.module)}</h2></div>
    <div class="body">
      <div class="row"><div class="desc">${escapeHtml(modDesc(mod))}</div></div>
      <div class="row"><div class="lbl">File</div><a class="jump" href="vscode://file/${ROOT}/${mod.file}">${mod.file}</a></div>
      <div class="row"><a class="jump" data-go-mod="${mod.module}">▸ open ${fns.length} functions in graph</a></div>
      <div class="row"><div class="lbl">Depends on (${outs.length})</div><ul>
        ${outs.sort((a,b)=>b.count-a.count).map(e => `<li data-go-mod="${e.to}">${shortMod(e.to)}<span class="cnt" style="float:right;color:var(--fg-dim)">${e.count}</span></li>`).join('') || '<li style="color:var(--fg-dim);cursor:default">— none —</li>'}
      </ul></div>
      <div class="row"><div class="lbl">Used by (${ins.length})</div><ul>
        ${ins.sort((a,b)=>b.count-a.count).map(e => `<li data-go-mod="${e.from}">${shortMod(e.from)}<span class="cnt" style="float:right;color:var(--fg-dim)">${e.count}</span></li>`).join('') || '<li style="color:var(--fg-dim);cursor:default">— none —</li>'}
      </ul></div>
      <div class="row"><div class="lbl">Top functions</div><ul>
        ${fns.slice(0, 12).map(n => `<li data-go-node="${n.id}">${escapeHtml(n.short)}<span class="cnt" style="float:right;color:var(--fg-dim)">${n.inDegree}←</span></li>`).join('')}
      </ul></div>
    </div>`);
}

function showFnDetail(n) {
  const callees = (outAdj.get(n.id) || []).map(i => nodeById.get(GRAPH.edges[i].to));
  const callers = (inAdj.get(n.id) || []).map(i => nodeById.get(GRAPH.edges[i].from));
  openDetail(`
    <div class="dh"><span class="close">×</span><div class="kind" style="color:${groupColor(n.group)}">${n.kind}${n.exported ? ' · exported' : ''}</div>
      <h2>${escapeHtml(n.short)}</h2></div>
    <div class="body">
      <div class="row"><div class="lbl">What it does in game</div><div class="desc">${escapeHtml(fnDesc(n))}</div></div>
      <div class="row"><div class="lbl">Signature</div><div class="sig">${escapeHtml(n.signature)}</div></div>
      <div class="row"><div class="lbl">Location</div><a class="jump" href="${vscodeUrl(n)}">${n.file}:${n.line}</a>
        &nbsp;·&nbsp;<a class="jump" data-go-mod="${n.module}">module graph</a></div>
      <div class="row"><div class="lbl">Calls (${callees.length})</div><ul>
        ${callees.map(c => `<li data-go-node="${c.id}">${escapeHtml(c.short)}<span class="cnt" style="float:right;color:var(--fg-dim)">${shortMod(c.module)}</span></li>`).join('') || '<li style="color:var(--fg-dim);cursor:default">— leaf —</li>'}
      </ul></div>
      <div class="row"><div class="lbl">Called by (${callers.length})</div><ul>
        ${callers.map(c => `<li data-go-node="${c.id}">${escapeHtml(c.short)}<span class="cnt" style="float:right;color:var(--fg-dim)">${shortMod(c.module)}</span></li>`).join('') || '<li style="color:var(--fg-dim);cursor:default">— entry point —</li>'}
      </ul></div>
    </div>`);
}

const ROOT = GRAPH.root || '';
function vscodeUrl(n) { return `vscode://file/${ROOT}/${n.file}:${n.line}`; }
function shortMod(m) { return m.replace(/^game\//, ''); }
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

// =====================================================================
// Pan / zoom
// =====================================================================
let pz = { x: 0, y: 0, k: 1 };
// Zoom bounds. Max is a hard cap; min is tied to the fit-to-screen scale so the
// whole (often very wide) graph always fits, but can't shrink to an unreadable speck.
const MAX_ZOOM = 3;
let fitK = 0.2; // updated by fitView() to the current fit-to-screen scale
const minZoom = () => Math.min(0.5, fitK * 0.5);
const clampK = (k) => Math.max(minZoom(), Math.min(MAX_ZOOM, k));

// ----- persistence (zoom/pan + view survive a reload) -----
const LS_KEY = 'codegraph:viewstate';
let defaultPct = 0;       // user-set default zoom %, 0 = fit-to-screen
let pendingRestore = null; // pan/zoom to restore on the first render after boot
let saveTimer = null;
function persist() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        view: state.view, module: state.module,
        pz: { x: pz.x, y: pz.y, k: pz.k }, defaultPct,
      }));
    } catch { /* private mode / quota */ }
  }, 250);
}
function loadPersisted() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch { return null; }
}

function applyPZ() {
  document.getElementById('viewport').style.transform = `translate(${pz.x}px,${pz.y}px) scale(${pz.k})`;
  const inp = document.getElementById('zoompct');
  if (inp && document.activeElement !== inp) inp.value = Math.round(pz.k * 100);
  persist();
}
// Zoom to factor k while keeping screen point (cx,cy) stationary (defaults to centre).
function setZoom(k, cx, cy) {
  const graph = document.getElementById('graph');
  if (cx == null) { cx = graph.clientWidth / 2; cy = graph.clientHeight / 2; }
  const nk = clampK(k);
  pz.x = cx - (cx - pz.x) * (nk / pz.k);
  pz.y = cy - (cy - pz.y) * (nk / pz.k);
  pz.k = nk; applyPZ();
}

function setupPanZoom(svgEl) {
  const graph = document.getElementById('graph');
  let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
  graph.onmousedown = (e) => { if (e.target.closest('.node') || e.target.closest('path')) return; dragging = true; graph.classList.add('panning'); sx = e.clientX; sy = e.clientY; ox = pz.x; oy = pz.y; };
  window.addEventListener('mousemove', (e) => { if (!dragging) return; pz.x = ox + (e.clientX - sx); pz.y = oy + (e.clientY - sy); applyPZ(); });
  window.addEventListener('mouseup', () => { dragging = false; graph.classList.remove('panning'); });
  const ZOOM_SENSITIVITY = 0.006; // higher = more zoom per scroll
  graph.onwheel = (e) => {
    e.preventDefault();
    const r = graph.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    // Scale by actual scroll delta (smooth across mouse/trackpad), capped per event.
    const dm = e.deltaMode === 1 ? 16 : e.deltaMode === 2 ? graph.clientHeight : 1;
    let f = Math.exp(-e.deltaY * dm * ZOOM_SENSITIVITY);
    f = Math.min(1.25, Math.max(0.8, f));
    setZoom(pz.k * f, mx, my);
  };
}

// Arrow-key panning (when focus isn't in a text field).
window.addEventListener('keydown', (e) => {
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  const step = e.shiftKey ? 220 : 70;
  let dx = 0, dy = 0;
  if (e.key === 'ArrowLeft') dx = step;
  else if (e.key === 'ArrowRight') dx = -step;
  else if (e.key === 'ArrowUp') dy = step;
  else if (e.key === 'ArrowDown') dy = -step;
  else return;
  e.preventDefault();
  pz.x += dx; pz.y += dy; applyPZ();
});

function fitView() {
  const graph = document.getElementById('graph');
  const svgEl = document.querySelector('#viewport svg'); if (!svgEl) return;
  const bb = svgEl.getBBox ? svgEl.getBBox() : null;
  const gw = graph.clientWidth, gh = graph.clientHeight;
  const w = svgEl.width.baseVal.value || (bb && bb.width) || gw;
  const h = svgEl.height.baseVal.value || (bb && bb.height) || gh;
  const k = Math.min(gw / w, gh / h) * 0.92;
  fitK = k;
  pz.k = Math.min(1.4, k); pz.x = (gw - w * pz.k) / 2; pz.y = (gh - h * pz.k) / 2; applyPZ();
}
// After fitView centres the view, honour a restored session or a default zoom %.
function applyInitialZoom() {
  fitView();
  if (pendingRestore) {
    pz = { x: pendingRestore.x, y: pendingRestore.y, k: clampK(pendingRestore.k) };
    applyPZ();
    pendingRestore = null;
  } else if (defaultPct > 0) {
    setZoom(defaultPct / 100);
  }
}
function setDefaultBtn() {
  const b = document.getElementById('zdefault');
  b.classList.toggle('on', defaultPct > 0);
  b.title = defaultPct > 0
    ? `Default zoom: ${defaultPct}% — click to update, again to clear`
    : 'Set current zoom as the default for new views';
}
document.getElementById('zin').onclick = () => setZoom(pz.k * 1.2);
document.getElementById('zout').onclick = () => setZoom(pz.k / 1.2);
document.getElementById('zfit').onclick = () => fitView();
document.getElementById('zdefault').onclick = () => {
  // toggle: set default to the current zoom, or clear it if one is already set
  defaultPct = defaultPct > 0 ? 0 : Math.round(pz.k * 100);
  setDefaultBtn(); persist();
};
(() => {
  const inp = document.getElementById('zoompct');
  const commit = () => { const v = parseFloat(inp.value); if (!isNaN(v) && v > 0) setZoom(v / 100); else inp.value = Math.round(pz.k * 100); };
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { commit(); inp.blur(); } });
  inp.addEventListener('blur', commit);
})();

// =====================================================================
// Headbar / chrome
// =====================================================================
function renderStats() {
  const s = GRAPH.stats;
  document.getElementById('statline').textContent = `${s.functions} fns · ${s.edges} calls · ${s.modules} modules · ${s.files} files`;
}

// type-to-filter module picker (native datalist). value -> full module name
const pickMap = new Map();
function renderModuleOptions() {
  const dl = document.getElementById('modlist-data');
  dl.innerHTML = '';
  const mods = GRAPH.moduleNodes.slice().sort((a, b) =>
    a.group === b.group ? b.fns - a.fns : a.group.localeCompare(b.group));
  for (const m of mods) {
    const val = shortMod(m.module);
    pickMap.set(val.toLowerCase(), m.module);
    const o = document.createElement('option');
    o.value = val;
    o.label = `${m.group} · ${m.fns} fn`;
    dl.appendChild(o);
  }
}
function tryPick(raw) {
  const v = (raw || '').trim().toLowerCase();
  if (!v) return;
  let full = pickMap.get(v) || pickMap.get('game/' + v);
  if (!full) { // partial: first module containing the text
    for (const [k, f] of pickMap) if (k.includes(v)) { full = f; break; }
  }
  if (full) focusModule(full);
}
function renderCrumbs() {
  const c = document.getElementById('crumbs');
  if (state.view === 'overview') c.innerHTML = `<span class="cur">Architecture overview — module dependency graph</span>`;
  else c.innerHTML = `<a id="bk">Architecture</a><span class="sep">/</span><span class="cur">${shortMod(state.module)}</span>`;
  const bk = document.getElementById('bk'); if (bk) bk.onclick = goOverview;
}

function focusModule(mod) {
  state.view = 'module'; state.module = mod;
  document.querySelectorAll('#viewseg button').forEach(b => b.classList.toggle('on', b.dataset.view === 'module'));
  document.getElementById('modpick').value = shortMod(mod);
  render();
}
function goOverview() {
  state.view = 'overview';
  document.querySelectorAll('#viewseg button').forEach(b => b.classList.toggle('on', b.dataset.view === 'overview'));
  document.getElementById('modpick').value = '';
  render();
}

document.querySelectorAll('#viewseg button').forEach(b => b.onclick = () => {
  if (b.dataset.view === 'overview') goOverview();
  else if (state.module) focusModule(state.module);
  else focusModule(GRAPH.moduleNodes.slice().sort((a, c) => c.fns - a.fns)[0].module);
});
document.getElementById('lbltoggle').onchange = (e) => { state.plain = e.target.checked; render(); };
document.getElementById('neightoggle').onchange = (e) => { state.neighbors = e.target.checked; render(); };
const modpick = document.getElementById('modpick');
modpick.addEventListener('change', (e) => tryPick(e.target.value));
modpick.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryPick(e.target.value); });
document.getElementById('graph').addEventListener('click', (e) => { if (e.target.id === 'graph' || e.target.id === 'viewport') closeDetail(); });

// boot — restore persisted view + zoom/pan so a reload doesn't reset
renderStats();
renderModuleOptions();
(() => {
  const saved = loadPersisted();
  if (!saved) return;
  defaultPct = saved.defaultPct || 0;
  setDefaultBtn();
  if (saved.view === 'module' && saved.module && modByName.has(saved.module)) {
    state.view = 'module'; state.module = saved.module;
    document.querySelectorAll('#viewseg button').forEach(b => b.classList.toggle('on', b.dataset.view === 'module'));
    document.getElementById('modpick').value = shortMod(saved.module);
    pendingRestore = saved.pz || null;
  } else if (saved.view === 'overview' || !saved.view) {
    pendingRestore = saved.pz || null;
  }
})();
render();

// Live-reload: active only when served over http (graph:serve / launch.sh --debug).
// Inert when the file is opened directly via file://.
if (location.protocol === 'http:' || location.protocol === 'https:') {
  try {
    const es = new EventSource('/__reload');
    es.onmessage = (e) => { if (e.data === 'reload') location.reload(); };
  } catch { /* no-op */ }
}
</script>
</body>
</html>
