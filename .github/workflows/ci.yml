name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ADR-008: the spatial core is a Rust/WASM module behind a TS interface.
      # Build it so the app/type-check see the real bindings (the pure-TS pathfinder
      # fallback keeps tests runnable even if this step is skipped).
      - name: Setup Rust + wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        continue-on-error: true

      - name: Build WASM spatial core
        run: pnpm run add:wasm
        continue-on-error: true

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run check

      - name: Unit tests
        run: pnpm test
