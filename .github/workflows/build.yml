name: Build desktop binaries

# Two ways to run:
#   • workflow_dispatch (Actions → "Run workflow" / `gh workflow run`): builds installers and uploads
#     them as run Artifacts. No release — use for ad-hoc / test builds.
#   • push a tag `vX.Y.Z` (`git tag v0.1.0 && git push origin v0.1.0`): builds both OSes AND publishes a
#     GitHub Release with the installers attached + auto-generated notes (the `release` job below).
# Develop on main; cut a release by tagging when you want one.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

# A newer manual run supersedes an in-flight one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # On a tag push, skip the whole cloud build when a published GitHub Release already exists for the tag.
  # That means it was cut locally by `build.sh --local --push` (which uploads its own installers), so
  # rebuilding here would be wasted compute + a doomed "release already exists" failure. workflow_dispatch
  # and the CI-path `build.sh --push` (no release yet) fall through and build normally.
  guard:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Does a published release already exist for this tag?
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists (cut locally) — skipping CI build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [guard]
    # Run unless the guard said skip. always() so the job still evaluates when guard is itself skipped
    # (workflow_dispatch): then outputs.skip is empty ≠ 'true' → build runs. A guard failure also leaves
    # it empty → build runs (fail open, never silently drop a release).
    if: ${{ always() && needs.guard.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04 # → AppImage + .deb
          - os: windows-latest # → NSIS .exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # pnpm first so setup-node can use it as the cache backend. Version comes from packageManager.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # pnpm@11.3.0 (packageManager) requires Node >= 22.13 — Node 20 fails the install step.
          node-version: 22
          cache: pnpm

      # Rust → WASM: spatial-core and sim-core are compiled fresh on each runner (the -pkg dirs are
      # gitignored, not committed), so the toolchain + wasm-pack are required before `pnpm build`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            spatial-core
            sim-core

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Call wasm-pack directly (on PATH via the action) rather than the `pnpm add:wasm` scripts, which
      # hardcode the Unix path ~/.cargo/bin/wasm-pack and so fail on the Windows runner. `shell: bash`
      # makes the subshell+&& syntax work on Windows too (git-bash ships on the runner).
      - name: Build WASM crates
        shell: bash
        run: |
          (cd spatial-core && wasm-pack build --target web --out-dir ../src/lib/spatial-core-pkg)
          (cd sim-core && wasm-pack build --target web --out-dir ../src/lib/sim-core-pkg)

      - name: Build SvelteKit static bundle
        run: pnpm build

      # Invoke electron-builder directly (not `pnpm package -- …`) so --publish never reliably reaches it:
      # the pnpm-script `--` indirection dropped the flag, so electron-builder tried to auto-publish a
      # GitHub release (needs GH_TOKEN) and failed even though every artifact built. We only want artifacts.
      - name: Package desktop binary
        run: pnpm exec electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: fantasia4x-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.blockmap
            dist-electron/latest*.yml

  # Only on a tag push: collect both OSes' installers and publish a GitHub Release. The changelog is
  # generated by git-cliff from the conventional commits since the previous tag (cliff.toml) — NOT
  # GitHub's PR-based notes, since this project commits directly to main. workflow_dispatch skips this.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the release and upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs the full history + tags

      - name: Generate changelog (git-cliff, commit-driven)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts # each artifact unpacks into artifacts/<artifact-name>/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t FILES < <(find artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.exe' \))
          echo "Attaching ${#FILES[@]} installer(s): ${FILES[*]}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file CHANGELOG_RELEASE.md \
            "${FILES[@]}"
