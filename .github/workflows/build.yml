name: Build desktop binaries

# Manually triggered only — run on demand from the Actions tab ("Run workflow") or
# `gh workflow run "Build desktop binaries"`. Develop on main; build installers when you actually want
# them, not on every push. Each matrix runner builds the installer for its own OS and uploads it as an
# artifact. It does NOT publish a release; grab the binaries from the run's Artifacts.
on:
  workflow_dispatch:

# A newer manual run supersedes an in-flight one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04 # → AppImage + .deb
          - os: windows-latest # → NSIS .exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # pnpm first so setup-node can use it as the cache backend. Version comes from packageManager.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # pnpm@11.3.0 (packageManager) requires Node >= 22.13 — Node 20 fails the install step.
          node-version: 22
          cache: pnpm

      # Rust → WASM: spatial-core and sim-core are compiled fresh on each runner (the -pkg dirs are
      # gitignored, not committed), so the toolchain + wasm-pack are required before `pnpm build`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            spatial-core
            sim-core

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Call wasm-pack directly (on PATH via the action) rather than the `pnpm add:wasm` scripts, which
      # hardcode the Unix path ~/.cargo/bin/wasm-pack and so fail on the Windows runner. `shell: bash`
      # makes the subshell+&& syntax work on Windows too (git-bash ships on the runner).
      - name: Build WASM crates
        shell: bash
        run: |
          (cd spatial-core && wasm-pack build --target web --out-dir ../src/lib/spatial-core-pkg)
          (cd sim-core && wasm-pack build --target web --out-dir ../src/lib/sim-core-pkg)

      - name: Build SvelteKit static bundle
        run: pnpm build

      # Invoke electron-builder directly (not `pnpm package -- …`) so --publish never reliably reaches it:
      # the pnpm-script `--` indirection dropped the flag, so electron-builder tried to auto-publish a
      # GitHub release (needs GH_TOKEN) and failed even though every artifact built. We only want artifacts.
      - name: Package desktop binary
        run: pnpm exec electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: fantasia4x-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.blockmap
            dist-electron/latest*.yml
